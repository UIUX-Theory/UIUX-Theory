site_name: 게슈탈트 → UI/UX 레퍼런스
site_description: 게슈탈트 시지각 원리를 UI/UX 설계에 적용하기 위한 학습 레퍼런스
site_url: https://uiux-theory.github.io/UIUX-Theory/
repo_url: https://github.com/UIUX-Theory/UIUX-Theory
repo_name: UIUX-Theory/UIUX-Theory
edit_uri: edit/main/docs/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  font:
    text: Pretendard
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - ko
        - en

nav:
  - 개요: index.md
  - 핵심 그룹핑 법칙:
    - 근접성 Proximity: principles/proximity.md
    - 유사성 Similarity: principles/similarity.md
    - 공통 영역 Common Region: principles/common-region.md
    - 연결성 Uniform Connectedness: principles/connectedness.md
    - 연속성 Continuity: principles/continuity.md
    - 폐쇄성 Closure: principles/closure.md
    - 전경-배경 Figure/Ground: principles/figure-ground.md
    - 공동운명 Common Fate: principles/common-fate.md
    - 대칭과 질서 Symmetry: principles/symmetry.md
  - 시각 위계: hierarchy.md
  - 화면 적용 케이스: case-studies.md
  - 안티패턴 / 흔한 실수: antipatterns.md
  - 실무 체크리스트: checklist.md
  - 참고 자료: references.md
  - 부록 용어집: glossary.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UIUX-Theory/UIUX-Theory
