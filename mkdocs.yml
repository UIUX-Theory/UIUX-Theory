site_name: 게슈탈트 → UI/UX 레퍼런스
site_description: 게슈탈트 시지각 원리를 UI/UX 설계에 적용하기 위한 학습 레퍼런스
site_url: https://uiux-theory.github.io/UIUX-Theory/
repo_url: https://github.com/UIUX-Theory/UIUX-Theory
repo_name: UIUX-Theory/UIUX-Theory
edit_uri: edit/main/docs/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  font:
    text: Pretendard
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - ko
        - en

nav:
  - 게슈탈트 → UI/UX: index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UIUX-Theory/UIUX-Theory
