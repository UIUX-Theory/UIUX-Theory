<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">원형 진행률 — 닫힐 도형으로 완료를 암시</text><circle cx="140" cy="220" r="60" fill="none" stroke="#D2D2D2" stroke-width="10"/><path d="M 140 160 A 60 60 0 0 1 200.0 220.0" fill="none" stroke="#6541F2" stroke-width="10" stroke-linecap="round"/><text x="140" y="228" text-anchor="middle" font-size="22" font-weight="800" fill="#5A5A5A">25%</text><text x="140" y="315" text-anchor="middle" font-size="12" font-weight="600" fill="#8C8C8C">진행 중</text><circle cx="320" cy="220" r="60" fill="none" stroke="#D2D2D2" stroke-width="10"/><path d="M 320 160 A 60 60 0 0 1 320.0 280.0" fill="none" stroke="#6541F2" stroke-width="10" stroke-linecap="round"/><text x="320" y="228" text-anchor="middle" font-size="22" font-weight="800" fill="#5A5A5A">50%</text><text x="320" y="315" text-anchor="middle" font-size="12" font-weight="600" fill="#8C8C8C">진행 중</text><circle cx="500" cy="220" r="60" fill="none" stroke="#D2D2D2" stroke-width="10"/><path d="M 500 160 A 60 60 0 1 1 440.0 220.0" fill="none" stroke="#6541F2" stroke-width="10" stroke-linecap="round"/><text x="500" y="228" text-anchor="middle" font-size="22" font-weight="800" fill="#5A5A5A">75%</text><text x="500" y="315" text-anchor="middle" font-size="12" font-weight="600" fill="#8C8C8C">진행 중</text><circle cx="680" cy="220" r="60" fill="none" stroke="#D2D2D2" stroke-width="10"/><circle cx="680" cy="220" r="60" fill="none" stroke="#6541F2" stroke-width="10"/><polyline points="662,220 676,234 702,206" fill="none" stroke="#6541F2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="680" y="315" text-anchor="middle" font-size="12" font-weight="600" fill="#8C8C8C">완료</text><text x="40" y="410" font-size="12" fill="#8C8C8C">→ 호의 일부만 보여도 '원이 닫힐 것'이라는 폐쇄 인지 → 진행률·완성도 직관적 표현</text></svg>