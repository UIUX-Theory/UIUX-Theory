<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">버튼 상태별 figure-ground 단계</text><text x="40" y="110" font-size="13" font-weight="700" fill="#5A5A5A">Default</text><text x="40" y="130" font-size="11" fill="#8C8C8C">기본 상태</text><rect x="320" y="88" width="160" height="42" rx="10" fill="#6541F2"/><text x="400.0" y="114.0" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">발행하기</text><text x="510" y="110" font-size="11" fill="#8C8C8C">기본 fill 색</text><text x="40" y="174" font-size="13" font-weight="700" fill="#5A5A5A">Hover</text><text x="40" y="194" font-size="11" fill="#8C8C8C">마우스 위</text><rect x="322" y="156" width="160" height="42" rx="10" fill="#000000" opacity="0.15"/><rect x="320" y="152" width="160" height="42" rx="10" fill="#5634D9"/><text x="400.0" y="178.0" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">발행하기</text><text x="510" y="174" font-size="11" fill="#8C8C8C">10% darker + shadow</text><text x="40" y="238" font-size="13" font-weight="700" fill="#5A5A5A">Focus</text><text x="40" y="258" font-size="11" fill="#8C8C8C">키보드 포커스</text><rect x="316" y="212" width="168" height="50" rx="13" fill="none" stroke="#6541F2" stroke-width="3" opacity="0.4"/><rect x="320" y="216" width="160" height="42" rx="10" fill="#6541F2"/><text x="400.0" y="242.0" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">발행하기</text><text x="510" y="238" font-size="11" fill="#8C8C8C">ring 3px (WCAG 2.4.7)</text><text x="40" y="302" font-size="13" font-weight="700" fill="#5A5A5A">Active</text><text x="40" y="322" font-size="11" fill="#8C8C8C">누르는 중</text><rect x="320" y="280" width="160" height="42" rx="10" fill="#4527B8"/><text x="400.0" y="306.0" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">발행하기</text><tex