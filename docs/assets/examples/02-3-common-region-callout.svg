<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">인라인 콜아웃 — 본문 안의 다른 영역</text><rect x="60" y="100" width="760" height="56" rx="8" fill="#3B82F6" opacity="0.08"/><rect x="60" y="100" width="4" height="56" fill="#3B82F6"/><text x="88" y="130" font-size="18" fill="#3B82F6">ℹ︎</text><text x="120" y="124" font-size="13" font-weight="700" fill="#3B82F6">정보</text><text x="120" y="142" font-size="12" fill="#5A5A5A">관련 안내를 본문 흐름 안에서 강조</text><rect x="60" y="170" width="760" height="56" rx="8" fill="#D97706" opacity="0.08"/><rect x="60" y="170" width="4" height="56" fill="#D97706"/><text x="88" y="200" font-size="18" fill="#D97706">⚠︎</text><text x="120" y="194" font-size="13" font-weight="700" fill="#D97706">경고</text><text x="120" y="212" font-size="12" fill="#5A5A5A">주의가 필요한 내용 — 결과에 영향</text><rect x="60" y="240" width="760" height="56" rx="8" fill="#1F9D55" opacity="0.08"/><rect x="60" y="240" width="4" height="56" fill="#1F9D55"/><text x="88" y="270" font-size="18" fill="#1F9D55">💡</text><text x="120" y="264" font-size="13" font-weight="700" fill="#1F9D55">팁</text><text x="120" y="282" font-size="12" fill="#5A5A5A">권장 사항 또는 추가로 알면 좋은 내용</text><rect x="60" y="310" width="760" height="56" rx="8" fill="#C53434" opacity="0.08"/><rect x="60" y="310" width="4" height="56" fill="#C53434"/><text x="88" y="340" font-size="18" fill="#C53434">✕</text><text x="120" y="334" font-size="13" font-weight="700" fill="#C53434">오류</text><text x="120" y="352" font-size="12" fill="#5A5A5A">처리 실패 또는 잘못된 입력 안내</text><text x="40" y="410" font-size="12" fill="#8C8C8C">→ 좌측 색 바 + 옅은 배경 — 본문과 분리되지만 흐름은 깨지 않음</text></svg>