<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">그리드 정렬 — 시선이 흐르는 페이지 vs 어긋난 페이지</text><text x="40" y="90" font-size="12" fill="#8C8C8C">✗ 어긋난 정렬 — 시선이 멈춤</text><rect x="50" y="130" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="62" y="142" width="80" height="10" rx="5" fill="#5A5A5A"/><rect x="62" y="158" width="100" height="6" rx="3" fill="#B0B0B0"/><rect x="240" y="138" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="252" y="150" width="80" height="10" rx="5" fill="#5A5A5A"/><rect x="252" y="166" width="100" height="6" rx="3" fill="#B0B0B0"/><rect x="60" y="240" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="72" y="252" width="80" height="10" rx="5" fill="#5A5A5A"/><rect x="72" y="268" width="100" height="6" rx="3" fill="#B0B0B0"/><rect x="235" y="235" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="247" y="247" width="80" height="10" rx="5" fill="#5A5A5A"/><rect x="247" y="263" width="100" height="6" rx="3" fill="#B0B0B0"/><text x="40" y="350" font-size="12" fill="#8C8C8C">x좌표 2–8px씩 어긋남 — 보이지 않게 거슬림</text><text x="440" y="90" font-size="12" fill="#8C8C8C">✓ 그리드 정렬 — 시선이 매끄럽게 흐름</text><rect x="460" y="130" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="472" y="142" width="80" height="10" rx="5" fill="#5A5A5A"/><rect x="472" y="158" width="100" height="6" rx="3" fill="#B0B0B0"/><rect x="620" y="130" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="632" y="142" width="80" height="10" rx="5" fill="#5A5A5A"/><rect x="632" y="158" width="100" height="6" rx="3" fill="#B0B0B0"/><rect x="460" y="240" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="472" y="252" width="80" height="10" rx="5" fill="#5A5A5A"/><rect x="472" y="268" width="100" height="6" rx="3" fill="#B0B0B0"/><rect x="620" y="240" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="632" y="252" width="80" height="10" rx="5" fill="#5A5A5A"/><rect x="632" y="268" width="100" height="6" rx="3" fill="#B0B0B0"/><line x1="460" y1="120" x2="460" y2="330" stroke="#6541F2" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/><line x1="620" y1="120" x2="620" y2="330" stroke="#6541F2" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/><text x="440" y="350" font-size="12" fill="#8C8C8C">동일 x축에 정렬 — 좌측 가장자리가 한 줄로 흐름</text><text x="40" y="410" font-size="12" fill="#8C8C8C">→ 2–4px 어긋남은 명시적 오류보다 더 거슬리는 잠재의식 부담 — 8pt 그리드로 자동 정렬 권장</text></svg>