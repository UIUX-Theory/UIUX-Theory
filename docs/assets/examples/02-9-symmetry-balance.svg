<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">대칭 vs 비대칭 균형 — 시각 무게의 분배</text><text x="40" y="90" font-size="12" fill="#8C8C8C">대칭 균형 — 정적·격식</text><line x1="220" y1="110" x2="220" y2="370" stroke="#D2D2D2" stroke-width="1" stroke-dasharray="4 4"/><rect x="130" y="130" width="180" height="18" rx="4" fill="#5A5A5A"/><rect x="150" y="160" width="140" height="8" rx="4" fill="#B0B0B0"/><rect x="140" y="190" width="160" height="100" rx="8" fill="#D2D2D2"/><rect x="170" y="310" width="100" height="36" rx="8" fill="#6541F2"/><text x="220" y="333" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">시작</text><text x="440" y="90" font-size="12" fill="#8C8C8C">비대칭 균형 — 동적·현대적 (광학 무게 균형)</text><rect x="460" y="130" width="180" height="200" rx="10" fill="#D2D2D2"/><rect x="660" y="130" width="160" height="14" rx="4" fill="#5A5A5A"/><rect x="660" y="156" width="120" height="14" rx="4" fill="#5A5A5A"/><rect x="660" y="186" width="160" height="6" rx="3" fill="#B0B0B0"/><rect x="660" y="200" width="140" height="6" rx="3" fill="#B0B0B0"/><rect x="660" y="214" width="155" height="6" rx="3" fill="#B0B0B0"/><rect x="660" y="250" width="100" height="34" rx="8" fill="#6541F2"/><text x="710" y="271" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">시작</text><text x="40" y="410" font-size="12" fill="#8C8C8C">→ 큰 이미지(좌)와 텍스트 블록 3개+CTA(우)가 광학적으로 균형 — 시각 무게가 같으면 비대칭도 안정</text></svg>