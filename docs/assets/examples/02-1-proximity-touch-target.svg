<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">터치 타겟 — 시각 그룹은 좁아도 히트 영역은 44pt 이상</text><text x="40" y="90" font-size="12" fill="#8C8C8C">✗ 시각=히트 일치, 너무 작음 (28pt)</text><rect x="60" y="130" width="180" height="28" rx="14" fill="#D2D2D2"/><text x="150" y="149" text-anchor="middle" font-size="13" fill="#5A5A5A">옵션 1</text><rect x="60" y="190" width="180" height="28" rx="14" fill="#D2D2D2"/><text x="150" y="209" text-anchor="middle" font-size="13" fill="#5A5A5A">옵션 2</text><rect x="60" y="250" width="180" height="28" rx="14" fill="#D2D2D2"/><text x="150" y="269" text-anchor="middle" font-size="13" fill="#5A5A5A">옵션 3</text><rect x="60" y="310" width="180" height="28" rx="14" fill="#D2D2D2"/><text x="150" y="329" text-anchor="middle" font-size="13" fill="#5A5A5A">옵션 4</text><text x="440" y="90" font-size="12" fill="#8C8C8C">✓ 시각 28pt + 투명 히트 44pt</text><rect x="460" y="122" width="240" height="44" rx="14" fill="#6541F2" opacity="0.10"/><rect x="480" y="130" width="180" height="28" rx="14" fill="#D2D2D2"/><text x="570" y="149" text-anchor="middle" font-size="13" fill="#5A5A5A">옵션 1</text><rect x="460" y="182" width="240" height="44" rx="14" fill="#6541F2" opacity="0.10"/><rect x="480" y="190" width="180" height="28" rx="14" fill="#D2D2D2"/><text x="570" y="209" text-anchor="middle" font-size="13" fill="#5A5A5A">옵션 2</text><rect x="460" y="242" width="240" height="44" rx="14" fill="#6541F2" opacity="0.10"/><rect x="480" y="250" width="180" height="28" rx="14" fill="#D2D2D2"/><text x="570" y="269" text-anchor="middle" font-size="13" fill="#5A5A5A">옵션 3</text><rect x="460" y="302" width="240" height="44" rx="14" fill="#6541F2" opacity="0.10"/><rect x="480" y="310" width="180" height="28" rx="14" fill="#D2D2D2"/><text x="570" y="329" text-anchor="middle" font-size="13" fill="#5A5A5A">옵션 4</text><text x="440" y="410" font-size="12" fill="#8C8C8C">투명 영역 = 실제 클릭 가능 — 시각 묶음과 히트 영역 분리</text></svg>