<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">광학적 중심 — 기하 중심 vs 시각 중심</text><text x="60" y="90" font-size="12" fill="#8C8C8C">삼각형 — 기하 중심 = 위로 치우쳐 보임</text><circle cx="160" cy="200" r="60" fill="#FFFFFF" stroke="#D2D2D2"/><polygon points="160,170 138,225 182,225" fill="#5A5A5A"/><text x="60" y="290" font-size="12" fill="#8C8C8C">기하적으로는 중앙이지만 시각적으로 ▲ 무게가 아래</text><text x="320" y="90" font-size="12" fill="#8C8C8C">광학 중심 보정 — 4–6px 아래로</text><circle cx="420" cy="200" r="60" fill="#FFFFFF" stroke="#6541F2" stroke-width="2"/><polygon points="420,176 398,231 442,231" fill="#6541F2"/><line x1="420" y1="200" x2="420" y2="210" stroke="#6541F2" stroke-width="1" stroke-dasharray="2 2"/><text x="320" y="290" font-size="12" fill="#8C8C8C">5px 아래로 이동 → 원 중심에 안착해 보임</text><text x="580" y="90" font-size="12" fill="#8C8C8C">재생 아이콘 — 같은 원리, 4–8px 우측 보정</text><circle cx="680" cy="200" r="60" fill="#FFFFFF" stroke="#6541F2" stroke-width="2"/><polygon points="664,176 700,200 664,224" fill="#6541F2"/><text x="580" y="290" font-size="12" fill="#8C8C8C">꼭짓점이 오른쪽 → 우측으로 살짝 이동해 균형</text><text x="40" y="410" font-size="12" fill="#8C8C8C">→ 기하 중심과 시각 중심은 다름. 비대칭 도형은 무게 중심을 향해 미세 보정이 필요</text></svg>