<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">CTA 강조 단계 — figure로 떠오르는 정도</text><rect x="60" y="100" width="260" height="280" rx="10" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="76" y="120" width="100" height="12" rx="4" fill="#5A5A5A"/><rect x="76" y="148" width="228" height="6" rx="3" fill="#B0B0B0"/><rect x="76" y="162" width="200" height="6" rx="3" fill="#B0B0B0"/><rect x="76" y="176" width="220" height="6" rx="3" fill="#B0B0B0"/><rect x="76" y="200" width="180" height="80" rx="6" fill="#D2D2D2"/><text x="190" y="338" text-anchor="middle" font-size="12" font-weight="600" fill="#6541F2">자세히 보기 →</text><text x="190" y="382" text-anchor="middle" font-size="11" fill="#8C8C8C">텍스트 링크 — 최소 강조</text><rect x="310" y="100" width="260" height="280" rx="10" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="326" y="120" width="100" height="12" rx="4" fill="#5A5A5A"/><rect x="326" y="148" width="228" height="6" rx="3" fill="#B0B0B0"/><rect x="326" y="162" width="200" height="6" rx="3" fill="#B0B0B0"/><rect x="326" y="176" width="220" height="6" rx="3" fill="#B0B0B0"/><rect x="326" y="200" width="180" height="80" rx="6" fill="#D2D2D2"/><rect x="380" y="320" width="120" height="36" rx="8" fill="#FFFFFF" stroke="#6541F2" stroke-width="1.5"/><text x="440" y="343" text-anchor="middle" font-size="12" font-weight="700" fill="#6541F2">시작하기</text><text x="440" y="382" text-anchor="middle" font-size="11" fill="#8C8C8C">outline — 보조 액션</text><rect x="560" y="100" width="260" height="280" rx="10" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="576" y="120" width="100" height="12" rx="4" fill="#5A5A5A"/><rect x="576" y="148" width="228" height="6" rx="3" fill="#B0B0B0"/><rect x="576" y="162" width="200" height="6" rx="3" fill="#B0B0B0"/><rect x="576" y="176" width="220" height="6" rx="3" fill="#B0B0B0"/><rect x="576" y="200" width="180" height="80" rx="6" fill="#D2D2D2"/><rect x="630" y="318" width="120" height="40" rx="8" fill="#6541F2"/><text x="690" y="343" text-anchor="middle" font-size="13" font-weight="800" fill="#FFFFFF">지금 시작</text><text x="690" y="382" text-anchor="middle" font-size="11" fill="#8C8C8C">fill — 주요 액션 (가장 강한 figure)</text><text x="40" y="420" font-size="12" fill="#8C8C8C">→ 한 화면에 fill CTA는 1–2개로 절제. 그 이상이면 모두 평등해져 전경이 사라짐</text></svg>