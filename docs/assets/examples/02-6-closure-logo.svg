<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">음각 폐쇄 — 보이지 않는 윤곽을 마음속에서 완성</text><text x="40" y="90" font-size="12" fill="#8C8C8C">단순 도형 — 닫힌 도형만 보임</text><rect x="80" y="140" width="60" height="120" rx="6" fill="#6541F2"/><rect x="80" y="140" width="120" height="22" rx="4" fill="#6541F2"/><rect x="80" y="190" width="100" height="22" rx="4" fill="#6541F2"/><rect x="80" y="240" width="120" height="22" rx="4" fill="#6541F2"/><rect x="220" y="140" width="60" height="120" rx="6" fill="#6541F2"/><rect x="220" y="140" width="120" height="22" rx="4" fill="#6541F2"/><rect x="220" y="190" width="100" height="22" rx="4" fill="#6541F2"/><text x="40" y="300" font-size="12" fill="#8C8C8C">F + E (글자 두 개)</text><text x="440" y="90" font-size="12" fill="#8C8C8C">음각 화살표 — 같은 글자 사이에 화살표가 떠오름</text><rect x="480" y="140" width="60" height="120" rx="6" fill="#6541F2"/><rect x="480" y="140" width="120" height="22" rx="4" fill="#6541F2"/><rect x="480" y="190" width="100" height="22" rx="4" fill="#6541F2"/><rect x="480" y="240" width="120" height="22" rx="4" fill="#6541F2"/><polygon points="620,160 700,200 620,240 660,200" fill="#6541F2"/><polygon points="720,160 780,160 720,240 660,200" fill="#6541F2"/><polygon points="660,180 680,200 660,220" fill="#FFFFFF"/><text x="700" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#6541F2">▶ 음각 화살표</text><text x="440" y="300" font-size="12" fill="#8C8C8C">글자 사이 흰 공간이 화살표로 인지됨</text><text x="40" y="420" font-size="12" fill="#8C8C8C">→ 명시적으로 그리지 않아도 뇌가 단서로 형태를 완성 (브랜드 기억성 ↑)</text></svg>