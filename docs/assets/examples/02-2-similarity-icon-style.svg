<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">아이콘 스타일 일관성 — 한 시스템 = 한 스타일</text><text x="40" y="90" font-size="12" fill="#8C8C8C">✗ filled·outlined 혼용 — 같은 종류로 안 보임</text><rect x="60" y="130" width="40" height="40" rx="6" fill="#5A5A5A"/><rect x="120" y="130" width="40" height="40" rx="6" fill="none" stroke="#5A5A5A" stroke-width="2"/><rect x="180" y="130" width="40" height="40" rx="6" fill="#5A5A5A"/><rect x="240" y="130" width="40" height="40" rx="6" fill="none" stroke="#5A5A5A" stroke-width="2"/><rect x="300" y="130" width="40" height="40" rx="6" fill="#5A5A5A"/><text x="40" y="220" font-size="12" fill="#8C8C8C">동일 그리드 위지만 시각 무게가 들쭉날쭉</text><text x="440" y="90" font-size="12" fill="#8C8C8C">✓ outlined 한 스타일 통일 — 같은 시스템으로 인지</text><rect x="460" y="130" width="40" height="40" rx="6" fill="none" stroke="#5A5A5A" stroke-width="2"/><rect x="520" y="130" width="40" height="40" rx="6" fill="none" stroke="#5A5A5A" stroke-width="2"/><rect x="580" y="130" width="40" height="40" rx="6" fill="none" stroke="#5A5A5A" stroke-width="2"/><rect x="640" y="130" width="40" height="40" rx="6" fill="none" stroke="#5A5A5A" stroke-width="2"/><rect x="700" y="130" width="40" height="40" rx="6" fill="none" stroke="#5A5A5A" stroke-width="2"/><text x="440" y="220" font-size="12" fill="#8C8C8C">stroke 2px, radius 6, 같은 크기 — 한 호흡으로 읽힘</text><text x="40" y="410" font-size="12" fill="#8C8C8C">→ Material·HIG 모두 한 화면 = 한 스타일 권장. filled/outlined 혼용은 카테고리 차이로 오해됨</text></svg>