<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">브레드크럼 + 트리 — 계층의 연결 신호</text><text x="40" y="90" font-size="12" fill="#8C8C8C">브레드크럼 — 구분자로 경로 연결</text><text x="60" y="135" font-size="13" font-weight="500" fill="#8C8C8C">홈</text><text x="82" y="135" font-size="13" fill="#B0B0B0">›</text><text x="96" y="135" font-size="13" font-weight="500" fill="#8C8C8C">설정</text><text x="132" y="135" font-size="13" fill="#B0B0B0">›</text><text x="146" y="135" font-size="13" font-weight="500" fill="#8C8C8C">알림</text><text x="182" y="135" font-size="13" fill="#B0B0B0">›</text><text x="196" y="135" font-size="13" font-weight="700" fill="#5A5A5A">이메일 알림</text><text x="40" y="190" font-size="12" fill="#8C8C8C">트리 — 들여쓰기 + 세로선으로 부모-자식 표시</text><text x="80" y="220" font-size="13" font-weight="700" font-family="ui-monospace,monospace" fill="#5A5A5A">▼ 디자인</text><text x="100" y="246" font-size="13" font-weight="500" font-family="ui-monospace,monospace" fill="#5A5A5A">├ 컴포넌트</text><text x="100" y="272" font-size="13" font-weight="500" font-family="ui-monospace,monospace" fill="#5A5A5A">│  ├ 버튼</text><text x="100" y="298" font-size="13" font-weight="500" font-family="ui-monospace,monospace" fill="#5A5A5A">│  └ 입력</text><text x="100" y="324" font-size="13" font-weight="500" font-family="ui-monospace,monospace" fill="#5A5A5A">└ 토큰</text><text x="80" y="350" font-size="13" font-weight="700" font-family="ui-monospace,monospace" fill="#5A5A5A">▶ 개발</text><text x="80" y="376" font-size="13" font-weight="700" font-family="ui-monospace,monospace" fill="#5A5A5A">▶ QA</text><text x="40" y="410" font-size="12" fill="#8C8C8C">→ 둘 다 연결성 원리: 구분자나 들여쓰기 선이 계층 관계의 시각 신호</text></svg>