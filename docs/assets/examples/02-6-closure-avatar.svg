<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">아바타 fallback — 닫힌 원 + 이니셜</text><text x="40" y="90" font-size="12" fill="#8C8C8C">사각형 + 텍스트만 — 누구인지 인지 약함</text><rect x="80" y="130" width="60" height="60" rx="4" fill="#D2D2D2"/><text x="110" y="167" text-anchor="middle" font-size="18" font-weight="700" fill="#8C8C8C">KH</text><rect x="180" y="130" width="60" height="60" rx="4" fill="#D2D2D2"/><text x="210" y="167" text-anchor="middle" font-size="18" font-weight="700" fill="#8C8C8C">JS</text><rect x="280" y="130" width="60" height="60" rx="4" fill="#D2D2D2"/><text x="310" y="167" text-anchor="middle" font-size="18" font-weight="700" fill="#8C8C8C">MY</text><text x="440" y="90" font-size="12" fill="#8C8C8C">닫힌 원 + 색 + 이니셜 — 고유 정체 인지</text><circle cx="510" cy="160" r="30" fill="#6541F2"/><text x="510" y="167" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">KH</text><circle cx="610" cy="160" r="30" fill="#1F9D55"/><text x="610" y="167" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">JS</text><circle cx="710" cy="160" r="30" fill="#D97706"/><text x="710" y="167" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">MY</text><rect x="80" y="210" width="60" height="8" rx="4" fill="#B0B0B0"/><rect x="85" y="225" width="50" height="6" rx="3" fill="#D2D2D2"/><rect x="180" y="210" width="60" height="8" rx="4" fill="#B0B0B0"/><rect x="185" y="225" width="50" height="6" rx="3" fill="#D2D2D2"/><rect x="280" y="210" width="60" height="8" rx="4" fill="#B0B0B0"/><rect x="285" y="225" width="50" height="6" rx="3" fill="#D2D2D2"/><rect x="480" y="210" width="60" height="8" rx="4" fill="#B0B0B0"/><rect x="485" y="225" width="50" height="6" rx="3" fill="#D2D2D2"/><rect x="580" y="210" width="60" height="8" rx="4" fill="#B0B0B0"/><rect x="585" y="225" width="50" height="6" rx="3" fill="#D2D2D2"/><rect x="680" y="210" width="60" height="8" rx="4" fill="#B0B0B0"/><rect x="685" y="225" width="50" height="6" rx="3" fill="#D2D2D2"/><text x="40" y="280" font-size="12" fill="#8C8C8C">닫힌 원형은 '사람/엔터티'의 시각 단위로 학습되어 있어 인지 빠름</text><text x="40" y="410" font-size="12" fill="#8C8C8C">→ 이미지 로딩 실패·없을 때도 사용자 인지 흐름이 끊기지 않음 (Slack·Gmail·Notion 등)</text></svg>