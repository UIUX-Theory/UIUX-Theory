<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">댓글 스레드 — 들여쓰기 + 세로선으로 부모-자식 연결</text><circle cx="74" cy="130" r="14" fill="#6541F2"/><text x="74" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">김</text><rect x="96" y="110" width="680" height="40" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><text x="112" y="127" font-size="11" font-weight="700" fill="#5A5A5A">김지수</text><text x="112" y="143" font-size="12" fill="#8C8C8C">디자인 시안 좋네요!</text><line x1="74" y1="140" x2="74" y2="200" stroke="#D2D2D2" stroke-width="1.5"/><line x1="74" y1="190" x2="100" y2="190" stroke="#D2D2D2" stroke-width="1.5"/><circle cx="114" cy="190" r="14" fill="#6541F2"/><text x="114" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">박</text><rect x="136" y="170" width="640" height="40" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><text x="152" y="187" font-size="11" font-weight="700" fill="#5A5A5A">박민호</text><text x="152" y="203" font-size="12" fill="#8C8C8C">어떤 부분이 좋으셨어요?</text><line x1="74" y1="200" x2="74" y2="260" stroke="#D2D2D2" stroke-width="1.5"/><line x1="114" y1="200" x2="114" y2="260" stroke="#D2D2D2" stroke-width="1.5"/><line x1="114" y1="250" x2="140" y2="250" stroke="#D2D2D2" stroke-width="1.5"/><circle cx="154" cy="250" r="14" fill="#6541F2"/><text x="154" y="255" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">김</text><rect x="176" y="230" width="600" height="40" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><text x="192" y="247" font-size="11" font-weight="700" fill="#5A5A5A">김지수</text><text x="192" y="263" font-size="12" fill="#8C8C8C">특히 색 시스템이요. 통일감 있어요.</text><line x1="74" y1="260" x2="74" y2="320" stroke="#D2D2D2" stroke-width="1.5"/><line x1="114" y1="260" x2="114" y2="320" stroke="#D2D2D2" stroke-width="1.5"/><line x1="114" y1="310" x2="140" y2="310" stroke="#D2D2D2" stroke-width="1.5"/><circle cx="154" cy="310" r="14" fill="#6541F2"/><text x="154" y="315" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">이</text><rect x="176" y="290" width="600" height="40" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><text x="192" y="307" font-size="11" font-weight="700" fill="#5A5A5A">이서연</text><text x="192" y="323" font-size="12" fill="#8C8C8C">동의합니다. 토큰화도 잘 돼있어요.</text><circle cx="74" cy="370" r="14" fill="#6541F2"/><text x="74" y="375" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">최</text><rect x="96" y="350" width="680" height="40" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><text x="112" y="367" font-size="11" font-weight="700" fill="#5A5A5A">최우진</text><text x="112" y="383" font-size="12" fill="#8C8C8C">QA에서 빨리 확인 가능한가요?</text><text x="40" y="420" font-size="12" fill="#8C8C8C">→ 세로선이 자식 댓글을 부모와 시각적으로 연결 — 들여쓰기만으로도 약하게 작동하지만 선이 추가되면 더 명확</text></svg>