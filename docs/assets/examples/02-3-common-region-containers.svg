<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">컨테이너 변형 — Modal / Bottom sheet / Popover</text><text x="40" y="90" font-size="12" fill="#8C8C8C">Modal — 전체 scrim + 중앙 카드</text><rect x="40" y="110" width="260" height="180" rx="10" fill="#707070" opacity="0.4"/><rect x="80" y="140" width="180" height="120" rx="10" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="96" y="156" width="100" height="10" rx="5" fill="#5A5A5A"/><rect x="96" y="174" width="148" height="6" rx="3" fill="#B0B0B0"/><rect x="96" y="186" width="120" height="6" rx="3" fill="#B0B0B0"/><rect x="200" y="222" width="46" height="22" rx="6" fill="#6541F2"/><text x="320" y="90" font-size="12" fill="#8C8C8C">Bottom sheet — 하단에서 슬라이드업</text><rect x="320" y="110" width="260" height="180" rx="10" fill="#707070" opacity="0.2"/><path d="M320,200 L580,200 L580,290 L320,290 Z" fill="#FFFFFF"/><rect x="436" y="210" width="28" height="4" rx="2" fill="#D2D2D2"/><rect x="340" y="226" width="100" height="10" rx="5" fill="#5A5A5A"/><rect x="340" y="244" width="220" height="6" rx="3" fill="#B0B0B0"/><rect x="340" y="256" width="180" height="6" rx="3" fill="#B0B0B0"/><text x="600" y="90" font-size="12" fill="#8C8C8C">Popover — 트리거 옆 작은 카드</text><rect x="600" y="110" width="240" height="180" rx="10" fill="#EBEBEB"/><rect x="616" y="170" width="68" height="32" rx="6" fill="#6541F2"/><text x="650" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">설정</text><polygon points="710,176 720,164 720,188" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="720" y="140" width="110" height="80" rx="8" fill="#FFFFFF" stroke="#D2D2D2"/><rect x="730" y="152" width="60" height="6" rx="3" fill="#5A5A5A"/><rect x="730" y="166" width="90" height="5" rx="2.5" fill="#B0B0B0"/><rect x="730" y="178" width="70" height="5" rx="2.5" fill="#B0B0B0"/><rect x="730" y="190" width="80" height="5" rx="2.5" fill="#B0B0B0"/><text x="40" y="360" font-size="12" fill="#8C8C8C">scrim 강도: Modal(가장 강함) > Bottom sheet(부분) > Popover(없음). 사용자 주목 수준에 맞춰 선택</text><text x="40" y="410" font-size="12" fill="#8C8C8C">→ 같은 공통영역 원리지만 위치·강도·태스크 흐름 차단 정도가 다름</text></svg>