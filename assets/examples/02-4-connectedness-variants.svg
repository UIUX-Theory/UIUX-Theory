<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="400" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">연결성 컨트롤 변형 — 같은 옵션 세트, 다른 그룹 신호</text><text x="40" y="100" font-size="12" fill="#8C8C8C">Segmented control — 하나의 막대(가장 강한 묶음, 상호배타적)</text><rect x="40" y="120" width="360" height="40" rx="10" fill="#F2EEFE"/><text x="85" y="145" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">일간</text><rect x="134" y="124" width="82" height="32" rx="7" fill="#FFFFFF"/><text x="175" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#6541F2">주간</text><text x="265" y="145" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">월간</text><text x="355" y="145" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">연간</text><text x="440" y="100" font-size="12" fill="#8C8C8C">Tab + underline — 콘텐츠 영역에 연결되는 약한 묶음</text><text x="485" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">일간</text><text x="575" y="144" text-anchor="middle" font-size="13" font-weight="700" fill="#6541F2">주간</text><rect x="542" y="156" width="66" height="3" rx="1.5" fill="#6541F2"/><text x="665" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">월간</text><text x="755" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">연간</text><line x1="440" y1="160" x2="800" y2="160" stroke="#D2D2D2" stroke-width="1"/><text x="40" y="220" font-size="12" fill="#8C8C8C">분리된 버튼들 — 연결 신호 없음 (관계 모호)</text><rect x="40" y="240" width="84" height="38" rx="8" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1.5"/><text x="82" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#5A5A5A">일간</text><rect x="140" y="240" width="84" height="38" rx="8" fill="#6541F2" stroke="none" stroke-width="1.5"/><text x="182" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">주간</text><rect x="240" y="240" width="84" height="38" rx="8" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1.5"/><text x="282" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#5A5A5A">월간</text><rect x="340" y="240" width="84" height="38" rx="8" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1.5"/><text x="382" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#5A5A5A">연간</text><text x="440" y="220" font-size="12" fill="#8C8C8C">Pill chips — 같은 컨테이너 안에 인접(중간 강도)</text><rect x="432" y="232" width="376" height="54" rx="27" fill="#FFFFFF" stroke="#D2D2D2"/><text x="476" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#8C8C8C">일간</text><rect x="526" y="240" width="80" height="38" rx="19" fill="#6541F2"/><text x="566" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">주간</text><text x="656" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#8C8C8C">월간</text><text x="746" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#8C8C8C">연간</text><text x="40" y="360" font-size="12" fill="#8C8C8C">→ 의미적으로 상호배타적이면 segmented, 콘텐츠 전환이면 tab, 약한 그룹이면 pill, 독립 액션이면 분리</text></svg>