<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>공통 영역 — 설정 카드</title>
<style>
  :root {
    --bg:#EBEBEB; --ink:#5A5A5A; --mid:#8C8C8C; --dom:#B0B0B0;
    --hi:#D2D2D2; --floor:#707070; --amber:#FFB919; --white:#FFFFFF;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:40px;background:var(--bg);color:var(--ink);
    font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;font-size:14px;line-height:1.5}
  h1{font-size:18px;margin:0 0 24px;color:var(--floor)}
  .stage{max-width:880px;margin:0 auto;background:var(--white);
    border-radius:20px;padding:32px;box-shadow:0 1px 0 rgba(0,0,0,.04)}

</style></head>
<body><h1>공통 영역 — 설정 카드</h1><div class="stage">
<p style="color:var(--floor);font-weight:600;margin-bottom:24px">카드(공통영역)로 설정 그룹 묶기</p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
  <section style="background:#fff;border:1px solid var(--hi);border-radius:14px;padding:20px">
    <h3 style="margin:0 0 16px;font-size:13px">알림</h3>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0"><span>이메일 알림</span><span style="display:inline-block;width:42px;height:22px;border-radius:11px;background:#FFB919;position:relative"><span style="position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:#fff"></span></span></div><div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0"><span>푸시 알림</span><span style="display:inline-block;width:42px;height:22px;border-radius:11px;background:#FFB919;position:relative"><span style="position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:#fff"></span></span></div><div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0"><span>주간 요약</span><span style="display:inline-block;width:42px;height:22px;border-radius:11px;background:#D2D2D2;position:relative"><span style="position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff"></span></span></div><div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0"><span>프로모션</span><span style="display:inline-block;width:42px;height:22px;border-radius:11px;background:#D2D2D2;position:relative"><span style="position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff"></span></span></div>
  </section>
  <section style="background:#fff;border:1px solid var(--hi);border-radius:14px;padding:20px">
    <h3 style="margin:0 0 16px;font-size:13px">개인정보</h3>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0"><span>프로필 공개</span><span style="display:inline-block;width:42px;height:22px;border-radius:11px;background:#D2D2D2;position:relative"><span style="position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff"></span></span></div><div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0"><span>활동 기록 수집</span><span style="display:inline-block;width:42px;height:22px;border-radius:11px;background:#FFB919;position:relative"><span style="position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:#fff"></span></span></div><div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0"><span>위치 사용</span><span style="display:inline-block;width:42px;height:22px;border-radius:11px;background:#D2D2D2;position:relative"><span style="position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff"></span></span></div><div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0"><span>광고 맞춤</span><span style="display:inline-block;width:42px;height:22px;border-radius:11px;background:#D2D2D2;position:relative"><span style="position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff"></span></span></div>
  </section></div>
<p style="color:var(--mid);font-size:12px;margin-top:24px">→ 테두리/카드 배경이 같은 종류의 컨트롤을 묶어준다 (근접성을 거스르고도)</p>
</div></body></html>
