<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">Skeleton screen — 폐쇄성으로 곧 채워질 구조를 미리 보임</text><text x="40" y="90" font-size="12" fill="#8C8C8C">Spinner — '뭔가 로딩 중'만 알림</text><rect x="40" y="110" width="380" height="280" rx="12" fill="#FFFFFF" stroke="#D2D2D2"/><line x1="248.0" y1="250.0" x2="260.0" y2="250.0" stroke="#6541F2" stroke-width="4" stroke-linecap="round" opacity="0.20"/><line x1="242.7" y1="262.7" x2="251.2" y2="271.2" stroke="#6541F2" stroke-width="4" stroke-linecap="round" opacity="0.30"/><line x1="230.0" y1="268.0" x2="230.0" y2="280.0" stroke="#6541F2" stroke-width="4" stroke-linecap="round" opacity="0.40"/><line x1="217.3" y1="262.7" x2="208.8" y2="271.2" stroke="#6541F2" stroke-width="4" stroke-linecap="round" opacity="0.50"/><line x1="212.0" y1="250.0" x2="200.0" y2="250.0" stroke="#6541F2" stroke-width="4" stroke-linecap="round" opacity="0.60"/><line x1="217.3" y1="237.3" x2="208.8" y2="228.8" stroke="#6541F2" stroke-width="4" stroke-linecap="round" opacity="0.70"/><line x1="230.0" y1="232.0" x2="230.0" y2="220.0" stroke="#6541F2" stroke-width="4" stroke-linecap="round" opacity="0.80"/><line x1="242.7" y1="237.3" x2="251.2" y2="228.8" stroke="#6541F2" stroke-width="4" stroke-linecap="round" opacity="0.90"/><text x="460" y="90" font-size="12" fill="#8C8C8C">Skeleton — 콘텐츠 형태를 미리 인지 (체감 시간 ↓)</text><rect x="460" y="110" width="380" height="280" rx="12" fill="#FFFFFF" stroke="#D2D2D2"/><circle cx="495" cy="145" r="20" fill="#D2D2D2"/><rect x="525" y="135" width="120" height="12" rx="6" fill="#D2D2D2"/><rect x="525" y="155" width="80" height="8" rx="4" fill="#D2D2D2" opacity="0.7"/><rect x="480" y="190" width="340" height="100" rx="8" fill="#D2D2D2"/><rect x="480" y="306" width="320" height="10" rx="5" fill="#D2D2D2"/><rect x="480" y="324" width="280" height="10" rx="5" fill="#D2D2D2"/><rect x="480" y="342" width="200" height="10" rx="5" fill="#D2D2D2"/><text x="40" y="420" font-size="12" fill="#8C8C8C">→ 사용자가 마음속에서 구조를 완성 — 같은 로딩 시간이라도 더 빠르게 느낌</text></svg>