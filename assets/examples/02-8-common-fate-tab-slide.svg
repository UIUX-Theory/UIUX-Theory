<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="40" y="50" font-size="14" font-weight="700" fill="#707070">Tab indicator slide — 공동운명으로 '같은 시스템' 학습</text><text x="40" y="100" font-size="12" fill="#8C8C8C">[프레임 A] 첫 번째 탭 선택</text><text x="87" y="154" text-anchor="middle" font-size="13" font-weight="700" fill="#6541F2">개요</text><text x="182" y="154" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">활동</text><text x="277" y="154" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">설정</text><text x="372" y="154" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">권한</text><line x1="40" y1="170" x2="420" y2="170" stroke="#D2D2D2" stroke-width="1"/><rect x="52" y="167" width="71" height="3" rx="1.5" fill="#6541F2"/><text x="40" y="220" font-size="20" fill="#6541F2">↓ 두 번째 탭 클릭 — 인디케이터가 슬라이드</text><path d="M87 225 Q 135 245 182 235" fill="none" stroke="#6541F2" stroke-width="2" stroke-dasharray="4 4"/><polygon points="177,232 187,238 179,242" fill="#6541F2"/><text x="40" y="280" font-size="12" fill="#8C8C8C">[프레임 B] 두 번째 탭 활성 — 인디케이터가 자연스럽게 이동</text><text x="87" y="334" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">개요</text><text x="182" y="334" text-anchor="middle" font-size="13" font-weight="700" fill="#6541F2">활동</text><text x="277" y="334" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">설정</text><text x="372" y="334" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">권한</text><line x1="40" y1="350" x2="420" y2="350" stroke="#D2D2D2" stroke-width="1"/><rect x="147" y="347" width="71" height="3" rx="1.5" fill="#6541F2"/><rect x="500" y="100" width="340" height="320" rx="12" fill="#FFFFFF" stroke="#D2D2D2"/><text x="520" y="130" font-size="13" font-weight="700" fill="#5A5A5A">왜 슬라이드인가?</text><text x="520" y="160" font-size="12" fill="#8C8C8C">• 인디케이터가 함께 움직이면</text><text x="520" y="182" font-size="12" fill="#8C8C8C">  탭들이 '한 시스템'으로 인지</text><text x="520" y="204" font-size="12" fill="#8C8C8C"></text><text x="520" y="226" font-size="12" fill="#8C8C8C">• 점프 트랜지션은 시각 단절</text><text x="520" y="248" font-size="12" fill="#8C8C8C">  → 사용자가 위치를 잃음</text><text x="520" y="270" font-size="12" fill="#8C8C8C"></text><text x="520" y="292" font-size="12" fill="#8C8C8C">• 200–250ms ease-in-out 권장</text><text x="520" y="314" font-size="12" fill="#8C8C8C">• 콘텐츠 영역도 fade로 함께 전환</text></svg>