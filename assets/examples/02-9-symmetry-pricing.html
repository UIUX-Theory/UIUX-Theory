<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>대칭/질서 — 가격표 그리드</title>
<style>
  :root {
    --bg:#EBEBEB; --ink:#5A5A5A; --mid:#8C8C8C; --dom:#B0B0B0;
    --hi:#D2D2D2; --floor:#707070; --amber:#FFB919; --white:#FFFFFF;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:40px;background:var(--bg);color:var(--ink);
    font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;font-size:14px;line-height:1.5}
  h1{font-size:18px;margin:0 0 24px;color:var(--floor)}
  .stage{max-width:880px;margin:0 auto;background:var(--white);
    border-radius:20px;padding:32px;box-shadow:0 1px 0 rgba(0,0,0,.04)}

</style></head>
<body><h1>대칭/질서 — 가격표 그리드</h1><div class="stage">
<p style="color:var(--floor);font-weight:600;margin-bottom:24px">대칭 그리드: 일관된 정렬이 "정돈됨 = 신뢰감"을 만든다</p>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px">
  <article style="position:relative;background:#fff;border:1px solid var(--hi);border-radius:16px;padding:24px;text-align:center">

    <h3 style="margin:0 0 12px">Basic</h3>
    <div style="font-size:28px;font-weight:800">₩0<span style="font-size:12px;font-weight:400;color:var(--mid)"> /월</span></div>
    <ul style="list-style:none;padding:0;margin:24px 0;text-align:left">
      <li style="padding:6px 0;color:var(--mid)">✓ 핵심 기능 A</li>
      <li style="padding:6px 0;color:var(--mid)">✓ 핵심 기능 B</li>
      <li style="padding:6px 0;color:var(--mid)">✓ 핵심 기능 C</li>
    </ul>
    <button style="width:100%;padding:12px;border:1.5px solid var(--dom);border-radius:10px;background:#fff;color:var(--ink);font-weight:700">선택</button>
  </article>
  <article style="position:relative;background:#fff;border:3px solid var(--amber);border-radius:16px;padding:24px;text-align:center">
    <span style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--amber);color:#fff;padding:4px 14px;border-radius:13px;font-size:11px;font-weight:700">추천</span>
    <h3 style="margin:0 0 12px">Pro</h3>
    <div style="font-size:28px;font-weight:800">₩9,900<span style="font-size:12px;font-weight:400;color:var(--mid)"> /월</span></div>
    <ul style="list-style:none;padding:0;margin:24px 0;text-align:left">
      <li style="padding:6px 0;color:var(--mid)">✓ 핵심 기능 A</li>
      <li style="padding:6px 0;color:var(--mid)">✓ 핵심 기능 B</li>
      <li style="padding:6px 0;color:var(--mid)">✓ 핵심 기능 C</li>
    </ul>
    <button style="width:100%;padding:12px;border:0;border-radius:10px;background:var(--amber);color:#fff;font-weight:700">선택</button>
  </article>
  <article style="position:relative;background:#fff;border:1px solid var(--hi);border-radius:16px;padding:24px;text-align:center">

    <h3 style="margin:0 0 12px">Team</h3>
    <div style="font-size:28px;font-weight:800">₩29,900<span style="font-size:12px;font-weight:400;color:var(--mid)"> /월</span></div>
    <ul style="list-style:none;padding:0;margin:24px 0;text-align:left">
      <li style="padding:6px 0;color:var(--mid)">✓ 핵심 기능 A</li>
      <li style="padding:6px 0;color:var(--mid)">✓ 핵심 기능 B</li>
      <li style="padding:6px 0;color:var(--mid)">✓ 핵심 기능 C</li>
    </ul>
    <button style="width:100%;padding:12px;border:1.5px solid var(--dom);border-radius:10px;background:#fff;color:var(--ink);font-weight:700">선택</button>
  </article></div></div></body></html>
