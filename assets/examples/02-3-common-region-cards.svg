<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="880" height="460" rx="20" fill="#EBEBEB"/><text x="60" y="50" font-size="14" font-weight="600" fill="#707070">카드(공통영역)로 설정 그룹 묶기</text><rect x="60" y="70" width="360" height="240" rx="14" fill="#FFFFFF" stroke="#D2D2D2"/><text x="80" y="98" font-size="13" font-weight="700" fill="#5A5A5A">알림</text><text x="80" y="140" font-size="12" fill="#5A5A5A">이메일 알림</text><rect x="360" y="124" width="42" height="22" rx="11" fill="#FFB919"/><circle cx="400" cy="135" r="8" fill="#FFFFFF"/><text x="80" y="176" font-size="12" fill="#5A5A5A">푸시 알림</text><rect x="360" y="160" width="42" height="22" rx="11" fill="#FFB919"/><circle cx="400" cy="171" r="8" fill="#FFFFFF"/><text x="80" y="212" font-size="12" fill="#5A5A5A">주간 요약</text><rect x="360" y="196" width="42" height="22" rx="11" fill="#D2D2D2"/><circle cx="378" cy="207" r="8" fill="#FFFFFF"/><text x="80" y="248" font-size="12" fill="#5A5A5A">프로모션</text><rect x="360" y="232" width="42" height="22" rx="11" fill="#D2D2D2"/><circle cx="378" cy="243" r="8" fill="#FFFFFF"/><rect x="460" y="70" width="360" height="240" rx="14" fill="#FFFFFF" stroke="#D2D2D2"/><text x="480" y="98" font-size="13" font-weight="700" fill="#5A5A5A">개인정보</text><text x="480" y="140" font-size="12" fill="#5A5A5A">프로필 공개</text><rect x="760" y="124" width="42" height="22" rx="11" fill="#D2D2D2"/><circle cx="778" cy="135" r="8" fill="#FFFFFF"/><text x="480" y="176" font-size="12" fill="#5A5A5A">활동 기록 수집</text><rect x="760" y="160" width="42" height="22" rx="11" fill="#FFB919"/><circle cx="800" cy="171" r="8" fill="#FFFFFF"/><text x="480" y="212" font-size="12" fill="#5A5A5A">위치 사용</text><rect x="760" y="196" width="42" height="22" rx="11" fill="#D2D2D2"/><circle cx="778" cy="207" r="8" fill="#FFFFFF"/><text x="480" y="248" font-size="12" fill="#5A5A5A">광고 맞춤</text><rect x="760" y="232" width="42" height="22" rx="11" fill="#D2D2D2"/><circle cx="778" cy="243" r="8" fill="#FFFFFF"/><text x="60" y="350" font-size="12" fill="#8C8C8C">→ 테두리/카드 배경이 같은 종류의 컨트롤을 묶어준다 (근접성을 거스르고도)</text></svg>