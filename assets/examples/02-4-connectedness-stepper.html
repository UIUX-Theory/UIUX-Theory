<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>연결성 — 단계 인디케이터</title>
<style>
  :root {
    --bg:#EBEBEB; --ink:#5A5A5A; --mid:#8C8C8C; --dom:#B0B0B0;
    --hi:#D2D2D2; --floor:#707070; --amber:#FFB919; --white:#FFFFFF;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:40px;background:var(--bg);color:var(--ink);
    font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;font-size:14px;line-height:1.5}
  h1{font-size:18px;margin:0 0 24px;color:var(--floor)}
  .stage{max-width:880px;margin:0 auto;background:var(--white);
    border-radius:20px;padding:32px;box-shadow:0 1px 0 rgba(0,0,0,.04)}

</style></head>
<body><h1>연결성 — 단계 인디케이터</h1><div class="stage">
<p style="color:var(--floor);font-weight:600;margin-bottom:40px">단계 인디케이터: 선이 단계들을 "하나의 흐름"으로 묶는다</p>
<div style="position:relative;display:flex;justify-content:space-between;padding:0 40px">
  <div style="position:absolute;left:60px;right:60px;top:21px;height:4px;background:var(--hi);z-index:0"></div>
  <div style="position:absolute;left:60px;width:200px;top:21px;height:4px;background:var(--amber);z-index:0"></div>
  <div style="position:relative;z-index:1;text-align:center;width:80px">
    <div style="width:46px;height:46px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-weight:700;background:var(--amber);color:#fff">✓</div>
    <div style="margin-top:12px;font-size:12px;color:var(--ink)">계정 생성</div>
  </div>
  <div style="position:relative;z-index:1;text-align:center;width:80px">
    <div style="width:46px;height:46px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-weight:700;background:#fff;border:3px solid var(--amber);color:var(--amber)">2</div>
    <div style="margin-top:12px;font-size:12px;color:var(--ink)">프로필 입력</div>
  </div>
  <div style="position:relative;z-index:1;text-align:center;width:80px">
    <div style="width:46px;height:46px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-weight:700;background:#fff;border:3px solid var(--hi);color:var(--dom)">3</div>
    <div style="margin-top:12px;font-size:12px;color:var(--mid)">이메일 인증</div>
  </div>
  <div style="position:relative;z-index:1;text-align:center;width:80px">
    <div style="width:46px;height:46px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-weight:700;background:#fff;border:3px solid var(--hi);color:var(--dom)">4</div>
    <div style="margin-top:12px;font-size:12px;color:var(--mid)">완료</div>
  </div></div></div></body></html>
